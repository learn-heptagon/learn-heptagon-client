        <script>
            function setEditorSingleLine(editor) {
                /* Previous implementation (which was not working)
                editor.renderer.setShowGutter(false);
                editor.setOption("maxLines", 1);
                */

                editor.setOptions({
                    maxLines: 1,
                    autoScrollEditorIntoView: true,
                    highlightActiveLine: false,
                    printMargin: false,
                    showGutter: false,
                });

                // Remove newlines in pasted text
                editor.on("paste", function(e) {
                    e.text = e.text.replace("/[\r\n]+/g", " ");
                });

                // Safety measure to keep the cursor within the editors visible bounds
                editor.renderer.screenToTextCoordinates = function(x, y) {
                    var pos = this.pixelToScreenCoordinates(x, y);
                    return this.session.screenToDocumentPosition(
                        Math.min(this.session.getScreenLength() - 1, Math.max(pos.row, 0)),
                        Math.max(pos.column, 0)
                    );
                };

                // Disable Enter and Shift-Enter keys
                editor.commands.bindKey("Enter|Shift-Enter", "null")
            }
            function setEditorHeight(editor) {
                editor.setOption('maxLines', 30);
            }
            function setEditorMinHeight(editor) {
                editor.setOption('minLines', 30);
            }
            function clearEditorSelection(editor) {
                editor.clearSelection();
            }
            function highlightLine(editor, line, isValid) {
                if (isValid) {
                    editor.session.addGutterDecoration(line - 1, "valid-decoration");
                } else {
                    editor.session.addGutterDecoration(line - 1, "invalid-decoration");
                }
            }
            function clearAllHighlights(editor) {
                const lastRow = editor.session.getLength();
                for (let row = 0; row < lastRow; row++) {
                    editor.session.removeGutterDecoration(row, "valid-decoration");
                    editor.session.removeGutterDecoration(row, "invalid-decoration");
                }
            }

            async function loadAudio(file) {
                let audioCtx = new AudioContext();
                return await audioCtx.decodeAudioData(await file.arrayBuffer());
            }

            function playBuffer(buffer) {
                let audioCtx = new AudioContext();
                let source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                source.start();
            }

            var audioContext;
            var gainNode;

            async function startLiveAudio(lustreStep) {
                audioContext = new AudioContext();
                gainNode = audioContext.createGain();

                <!-- await audioContext.audioWorklet.addModule("./lustre-audio-processor.js"); -->

                if (!navigator.getUserMedia)
                        navigator.getUserMedia = navigator.getUserMedia || navigator.webkitGetUserMedia ||
                                    navigator.mozGetUserMedia || navigator.msGetUserMedia;

                if (navigator.getUserMedia){

                    navigator.getUserMedia({audio:true},  start_microphone,
                    function(e) {
                        alert('Error capturing audio.');
                    });

                } else { alert('getUserMedia not supported in this browser.'); }

                function start_microphone(stream){

                    var microphone_stream = audioContext.createMediaStreamSource(stream);
                    <!-- var processor = new AudioWorkletNode( -->
                    <!--     audioContext, -->
                    <!--     "lustre-audio-processor", -->
                    <!--     { processorOptions : { lustreCls: lustreCls } }); -->

                    var processor = audioContext.createScriptProcessor(256, 1, 1);
                    processor.addEventListener(
                        "audioprocess",
                        (event) => {
                            let inputBuffer = event.inputBuffer;
                            let outputBuffer = event.outputBuffer;

                            for(let channel = 0; channel < outputBuffer.numberOfChannels; channel++) {
                                let inputData = inputBuffer.getChannelData(channel);
                                let outputData = outputBuffer.getChannelData(channel);
                                res = lustreStep(inputData);
                                for(let i = 0; i < res.length; i++) {
                                    outputData[i] = res[i];
                                }
                            }
                        });
                    microphone_stream.connect(processor);
                    processor.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                }

            }

            function stopLiveAudio() {
                if(audioContext) {
                  audioContext.close();
                  audioContext = null;
                }
            }

            function setGain(volume) {
               gainNode.gain.value = volume;
               console.log("volume = ", volume);
            }
        </script>
